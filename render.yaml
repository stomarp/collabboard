services:
  - type: web
    name: collabboard-api
    runtime: python
    rootDir: backend
    plan: free
    region: oregon
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: ./start.sh
    healthCheckPath: /health
    envVars:
      - key: APP_NAME
        value: CollabBoard API
      - key: APP_ENV
        value: production
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: collabboard-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: collabboard-redis
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60

  - type: keyvalue
    name: collabboard-redis
    plan: free
    region: oregon
    maxmemoryPolicy: noeviction
    ipAllowList: []

databases:
  - name: collabboard-db
    plan: free
    databaseName: collabboard
    user: collabboard

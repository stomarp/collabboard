services:
  postgres:
    image: postgres:16-alpine
    container_name: collabboard-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: collabboard_dev
      POSTGRES_USER: collabboard
      POSTGRES_PASSWORD: collabboard
    ports:
      - "55432:5432"
    volumes:
      - collabboard_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U collabboard -d collabboard_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: collabboard-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - collabboard_redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: collabboard-backend
    restart: unless-stopped
    environment:
      APP_NAME: CollabBoard API
      APP_ENV: development
      FRONTEND_URL: http://localhost:3000
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      DATABASE_URL: postgresql+psycopg://collabboard:collabboard@postgres:5432/collabboard_dev
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
    container_name: collabboard-frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_APP_NAME: CollabBoard
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    command: npm run dev

volumes:
  collabboard_postgres_data:
  collabboard_redis_data:
